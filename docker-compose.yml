services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MARIADB_HOST: db
      MARIADB_DATABASE: chat
      MARIADB_USER: chat_user
      MARIADB_PASSWORD: chat_password
    ports:
      - "3000:80"
    depends_on:
      - db

  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: chat
      MARIADB_USER: chat_user
      MARIADB_PASSWORD: chat_password
      MARIADB_USER_HOST: "%"
    volumes:
      - db_data_v8:/var/lib/mysql
      - ./init-messages.sh:/docker-entrypoint-initdb.d/init-messages.sh:ro

volumes:
  db_data_v8:
