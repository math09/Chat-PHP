services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MARIADB_HOST: db
      MARIADB_DATABASE: chat
      MARIADB_USER: chat_user
      MARIADB_PASSWORD: chat_password
    ports:
      - "3000:80"
    depends_on:
      - db

  db:
    image: mariadb:11
    command: --bind-address=0.0.0.0
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: chat
      MARIADB_USER: chat_user
      MARIADB_PASSWORD: chat_password
    volumes:
      - db_data:/var/lib/mysql
      - ./web.sql:/docker-entrypoint-initdb.d/web.sql:ro

volumes:
  db_data:
